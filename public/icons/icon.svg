<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#shine)"/>
  <!-- Four-leaf clover -->
  <g transform="translate(256, 220)" filter="url(#shadow)">
    <!-- Top leaf -->
    <ellipse cx="0" cy="-52" rx="48" ry="56" fill="#ffffff" opacity="0.95"/>
    <!-- Bottom leaf -->
    <ellipse cx="0" cy="52" rx="48" ry="56" fill="#ffffff" opacity="0.85"/>
    <!-- Left leaf -->
    <ellipse cx="-52" cy="0" rx="56" ry="48" fill="#ffffff" opacity="0.90"/>
    <!-- Right leaf -->
    <ellipse cx="52" cy="0" rx="56" ry="48" fill="#ffffff" opacity="0.90"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="18" fill="#16a34a"/>
    <circle cx="0" cy="0" r="12" fill="#ffffff" opacity="0.3"/>
    <!-- Stem -->
    <path d="M 5 25 Q 12 70 25 100 Q 30 110 22 110 Q 10 108 8 95 Q 2 70 -2 40 Z" fill="#ffffff" opacity="0.7"/>
  </g>
  <!-- Lottery balls -->
  <g filter="url(#shadow)">
    <!-- Ball 1 -->
    <circle cx="138" cy="400" r="32" fill="#ffffff"/>
    <circle cx="132" cy="393" r="8" fill="#16a34a" opacity="0.15"/>
    <text x="138" y="408" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#16a34a">7</text>
    <!-- Ball 2 -->
    <circle cx="218" cy="400" r="32" fill="#ffffff"/>
    <circle cx="212" cy="393" r="8" fill="#16a34a" opacity="0.15"/>
    <text x="218" y="408" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#16a34a">13</text>
    <!-- Ball 3 -->
    <circle cx="298" cy="400" r="32" fill="#fbbf24"/>
    <circle cx="292" cy="393" r="8" fill="#ffffff" opacity="0.3"/>
    <text x="298" y="408" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#ffffff">25</text>
    <!-- Ball 4 -->
    <circle cx="378" cy="400" r="32" fill="#ffffff"/>
    <circle cx="372" cy="393" r="8" fill="#16a34a" opacity="0.15"/>
    <text x="378" y="408" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#16a34a">42</text>
  </g>
  <!-- Small sparkles -->
  <circle cx="100" cy="100" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="420" cy="85" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="440" cy="150" r="5" fill="#ffffff" opacity="0.4"/>
  <circle cx="80" cy="170" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="400" cy="300" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="110" cy="310" r="3" fill="#ffffff" opacity="0.4"/>
</svg>
